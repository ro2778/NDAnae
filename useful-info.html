<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Useful Information — North Devon Anaesthetics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root[data-theme="dark"] {
  --bg: #0a0a0a; --bg2: #1a1a1a; --bg3: #222; --text: #e0e0e0; --text2: #aaa;
  --text3: #666; --border: #333; --accent: #7ab5e8; --gold: #ffd700;
  --white: #fff; --mono: #7ab5e8;
}
:root[data-theme="light"] {
  --bg: #f0f2f5; --bg2: #ffffff; --bg3: #f8fafc; --text: #1a1a2e; --text2: #555;
  --text3: #999; --border: #ddd; --accent: #2b6cb0; --gold: #b8860b;
  --white: #1a1a2e; --mono: #1A5276;
}

body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 12px; max-width: 600px; margin: 0 auto; }

.header { display: flex; justify-content: center; align-items: center; position: relative; margin-bottom: 16px; padding: 8px 44px 4px 44px; }
h1 { font-size: 18px; color: var(--accent); }
.theme-toggle { position: absolute; right: 0; top: 0; background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 8px; }

/* Section */
.section { margin-bottom: 20px; }
.section-title { font-size: 13px; font-weight: 700; color: var(--gold); margin-bottom: 8px; padding: 4px 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
.section-icon { font-size: 16px; }

/* Rows */
.info-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--bg2); border: 1px solid var(--border); }
.info-row:first-of-type { border-radius: 8px 8px 0 0; }
.info-row:last-of-type { border-radius: 0 0 8px 8px; }
.info-row:only-of-type { border-radius: 8px; }
.info-row + .info-row { border-top: none; }
.info-row:nth-child(even) { background: var(--bg3); }

.info-label { font-size: 13px; font-weight: 600; color: var(--text); }
.info-note { font-size: 10px; color: var(--text3); font-weight: 400; }
.info-value { font-size: 15px; font-weight: 700; color: var(--mono); font-family: 'SF Mono', 'Menlo', monospace; letter-spacing: 0.05em; }
.info-value.tba { color: #E74C3C; }

/* Search */
.search-box { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg2); color: var(--text); font-size: 14px; margin-bottom: 16px; outline: none; }
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--text3); }

.hidden { display: none; }
</style>
</head>
<body>

<div class="header">
  <h1>Useful Information</h1>
</div>

<input type="text" class="search-box" id="search" placeholder="Search bleeps, codes, numbers...">

<div id="content"></div>

<script>
var theme = localStorage.getItem('ndanae-theme') || 'light';
document.documentElement.setAttribute('data-theme', theme);
/* Theme inherited from parent app via localStorage */

var DATA = {
  sections: [
    {
      title: "Bleeps",
      icon: "📟",
      note: "To bleep: dial 74 + bleep number + your extension",
      items: [
        { label: "Gen Consultant", note: "or via Switchboard", value: "Bleep 300" },
        { label: "ITU Consultant", note: "or via Switchboard", value: "Bleep 505" },
        { label: "Resident Anaesthetist Emergencies", value: "Bleep 508" },
        { label: "Resident Anaesthetist Maternity", value: "Bleep 822" },
        { label: "ITU Resident", value: "Bleep 504" },
        { label: "Resident Surgeon", value: "Bleep 900" },
        { label: "ODP", value: "Bleep 119" },
        { label: "Blood Bank", value: "Bleep 045" },
        { label: "X-ray", value: "Bleep 042" },
        { label: "Acute Pain", note: "Bleep 504 out of hours", value: "Bleep 274" },
        { label: "Haem Reg", value: "Bleep 879" },
        { label: "Out of Hours Haem", value: "Bleep 227" }
      ]
    },
    {
      title: "Door Codes / Access Codes",
      icon: "🚪",
      items: [
        { label: "Resus Paramedics Entrance", value: "1994" },
        { label: "ITU", value: "5432" },
        { label: "Recovery", value: "1970" },
        { label: "Labour Ward Main Entrance", value: "6532" },
        { label: "Epidural Level 1", value: "700" },
        { label: "Epidural Level 2", value: "279" },
        { label: "PCA", value: "2414" },
        { label: "Library", value: "C 9538" },
        { label: "Labour Ward Doctors Office", value: "C 1920 A" },
        { label: "Pool Room", value: "4386x" },
        { label: "Doctor's Mess", value: "9753" }
      ]
    },
    {
      title: "Extensions & Phone Numbers",
      icon: "📞",
      items: [
        { label: "Anaesthetic Secretaries", note: "External: 01271 322756", value: "Ext 2756 / 3345 / 4223" },
        { label: "Anaesthetic Break Room", value: "Ext 3348" },
        { label: "Labour Ward", value: "Ext 2603 / 3795" },
        { label: "Theatre 1", note: "Elective Ortho", value: "Ext 3140" },
        { label: "Theatre 2", note: "Trauma", value: "Ext 3141" },
        { label: "Theatre 3", note: "CEPOD", value: "Ext 3142" },
        { label: "Theatre 4", note: "General/CEPOD", value: "Ext 3167" },
        { label: "Theatre 5", note: "Day Case", value: "Ext 3247" },
        { label: "Theatre 6", note: "Day Case", value: "Ext 2488" },
        { label: "Theatre 7", note: "Gynae/Breast", value: "Ext 3709" },
        { label: "Theatre 8", note: "Obstetrics", value: "Ext 3868" },
        { label: "Theatre 10", note: "Endoscopy", value: "Ext 5963" },
        { label: "ITU", value: "Ext 2707" },
        { label: "Blood Bank", note: "also Bleep 045", value: "Ext 2467 / 2466" },
        { label: "Haematology Lab", value: "Ext 2918" },
        { label: "Preop Clinic Reception", value: "Ext 2825" },
        { label: "Preop Clinic Room", value: "Ext 6500" }
      ]
    }
  ]
};

function render(filter) {
  var container = document.getElementById('content');
  var html = '';
  var query = (filter || '').toLowerCase();

  for (var s = 0; s < DATA.sections.length; s++) {
    var section = DATA.sections[s];
    var visibleItems = section.items.filter(function(item) {
      if (!query) return true;
      return item.label.toLowerCase().indexOf(query) >= 0 ||
             item.value.toLowerCase().indexOf(query) >= 0 ||
             (item.note || '').toLowerCase().indexOf(query) >= 0;
    });

    if (visibleItems.length === 0) continue;

    html += '<div class="section">';
    html += '<div class="section-title"><span class="section-icon">' + section.icon + '</span> ' + section.title + '</div>';
    if (section.note) html += '<div style="font-size:12px;color:var(--text2);padding:0 12px 8px;margin-top:-4px;">' + section.note + '</div>';

    for (var i = 0; i < visibleItems.length; i++) {
      var item = visibleItems[i];
      var isTba = item.value === 'TBA' || item.value === 'xxx';
      html += '<div class="info-row">';
      html += '<div><span class="info-label">' + item.label + '</span>';
      if (item.note) html += '<br><span class="info-note">' + item.note + '</span>';
      html += '</div>';
      html += '<span class="info-value' + (isTba ? ' tba' : '') + '">' + item.value + '</span>';
      html += '</div>';
    }

    html += '</div>';
  }

  if (!html) {
    html = '<div style="text-align:center;color:var(--text3);padding:40px 0;font-style:italic">No results</div>';
  }

  container.innerHTML = html;
}

document.getElementById('search').addEventListener('input', function() {
  render(this.value);
});

render();
</script>
</body>
</html>
